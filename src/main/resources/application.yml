    - GAIL
    - ADSL
    - ARE&M
    - NCC
    - STERTOOLS
    - TEXRAIL
    - TITAGARH
    - MANINDS
    - SERVOTECH
    - IRCON
  # Alert-only announcements (see alert-only-keywords below) for symbols on this
  # watchlist always send. For everything else, only send if the AI-derived
  # rating clears this bar -- avoids alert-only noise for 300+ non-watchlist
  # stocks while still surfacing genuinely major results for anyone.
  alert-only-rating-threshold: 8.0
  circular-keywords:
    - "orders"
    - "contracts"
  announcement-keywords:
    - "Bagging/Receiving of orders/contracts"
  # Alert-only categories: sent to Telegram like a normal announcement, but skip
  # PDF-fetch, AI rating, and the Upstox trade pipeline entirely -- these aren't
  # order/contract signals and the rating prompt (order-size-vs-market-cap) doesn't
  # make sense applied to them. Added 2026-07-22 after JSWINFRA's quarterly results
  # were missed: NSE files results under "Outcome of Board Meeting", not a
  # "results"/"quarterly" label, so a plain keyword match on that category is what
  # actually catches it.
  alert-only-keywords:
    - "Outcome of Board Meeting"
  ignore-keywords:
    - "Awarding or Bagging of Orders/Contracts-XBRL"

  # poll-interval-ms no longer used — polling is dynamic:
  #   2 min during market hours (IST 09:15–15:30, Mon–Fri)
  #   5 min outside market hours
  ignore-sme: true          # set to false to also receive NSE Emerge (SME) announcements


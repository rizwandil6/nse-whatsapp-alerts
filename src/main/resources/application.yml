# ── Upstox Trade Execution ────────────────────────────────────────────────────
# Set UPSTOX_ENABLED=true in Railway env to activate live trading.
# Refresh UPSTOX_ACCESS_TOKEN daily before market open (Upstox daily OAuth token).
upstox:
  access-token: ${UPSTOX_ACCESS_TOKEN:}
  enabled: ${UPSTOX_ENABLED:false}
  # Shadow mode simulates the same rules against real prices for every rating>=nse.trade-rating-threshold
  # signal that DOESN'T go live (or all of them, while enabled=false) and logs the
  # outcome via TradeLog — the recommended way to collect real performance data
  # before risking capital. Requires UPSTOX_ACCESS_TOKEN (for LTP + instrument list)
  # but does not place any orders.
  shadow-enabled: ${UPSTOX_SHADOW_ENABLED:true}
  capital-per-trade: ${UPSTOX_CAPITAL_PER_TRADE:5000}   # ₹ per trade
  nifty-gate-pct: 0.5        # skip if NIFTY down > 0.5% vs prev close
  stop-loss-pct: 1.5         # hard stop: -1.5% on full position
  target-pct: 2.0            # partial exit: sell 50% at +2%
  trail-pct: 1.0             # trailing stop: exit remaining when peak drops by 1%
  time-exit-minutes: 45      # force square-off after 45 min
  circuit-breaker-limit: 2   # pause after 2 consecutive stop-losses

# CSV trade log (live + shadow trades) — see TradeLog.java for the durability caveat
# on platforms without a persistent volume (e.g. Railway). TradeLogGitSync commits
# this file to GitHub once daily (15:35 IST) so it survives redeploys.
tradelog:
  path: ${TRADELOG_PATH:trades.csv}

github:
  token: ${GITHUB_TOKEN:}

# Shared password gating /dashboard and /api/dashboard/** (see
# DashboardAuthInterceptor). Must be set via Railway env var -- if blank,
# LoginController refuses every login attempt rather than defaulting open.
dashboard:
  password: ${DASHBOARD_PASSWORD:}


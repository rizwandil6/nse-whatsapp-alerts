<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alerts Dashboard · Sign in</title>
<style>
  :root {
    --bg: #F1F3F6; --surface: #FFFFFF; --ink: #1B2430; --ink-muted: #5B6472;
    --accent: #2C3E6B; --accent-soft: #E4E8F2; --border: #DDE1E8; --loss: #B3402E;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #12151C; --surface: #1A1E27; --ink: #E7EAF0; --ink-muted: #9AA3B2; --accent: #8DA0DE; --accent-soft: #212843; --border: #2A2F3B; --loss: #E27B69; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; width: min(360px, 90vw); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  h1 { font-family: Georgia, serif; font-size: 24px; margin: 0 0 20px; }
  input[type="password"] {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--ink); background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; margin-bottom: 14px;
  }
  input[type="password"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button { width: 100%; font-family: inherit; font-size: 14px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 8px; padding: 11px 14px; cursor: pointer; }
  button:hover { opacity: 0.92; }
  .error { color: var(--loss); font-size: 13px; margin: -6px 0 14px; min-height: 1em; }
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="eyebrow">Private</div>
    <h1>Alerts Dashboard</h1>
    <div class="error">{{ERROR}}</div>
    <input type="password" name="password" placeholder="Password" autofocus required />
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
